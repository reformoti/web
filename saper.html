<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сапёр — Таймер + Победы</title>
  <style>
    /* Глобальный сброс и базовый стиль */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #3a4a5c;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Consolas', 'Lucida Console', monospace;
      padding: 20px;
      background-image: 
        linear-gradient(45deg, #3f5268 2%, #2f3f52 100%);
    }

    /* карточка — как окно сапёра */
    .card {
      background: #b0b8b0;
      background-image: 
        linear-gradient(145deg, #bfc8bf 0%, #a0a8a0 100%);
      padding: 24px 28px 28px;
      border-radius: 12px;
      max-width: 520px;
      width: 100%;
      box-shadow: 
        0 0 0 2px #4a4f4a,
        0 0 0 5px #7a827a,
        0 8px 24px rgba(0, 0, 0, 0.7);
      border: 3px solid #d0d8d0;
      text-align: center;
      transition: all 0.1s;
    }

    /* верхняя панель: меню как в сапёре */
    .menu-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #b0b8b0;
      padding: 4px 4px 6px 4px;
      border-bottom: 3px solid #7a827a;
      margin-bottom: 16px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #1a2a1a;
      text-shadow: 1px 1px 0 #d0d8d0;
      letter-spacing: 0.5px;
      flex-wrap: wrap;
      gap: 4px 12px;
    }

    .menu-bar span {
      background: #a0a8a0;
      padding: 2px 10px;
      border-radius: 4px;
      border: 2px solid #6a726a;
      border-top-color: #d0d8d0;
      border-left-color: #d0d8d0;
      box-shadow: inset 0 1px 3px #4a524a;
      cursor: default;
    }

    .menu-bar .title {
      background: transparent;
      border: none;
      box-shadow: none;
      font-size: 1.2rem;
      padding: 0 4px;
      color: #1a2a1a;
      letter-spacing: 2px;
    }

    /* блок счёта побед — как в сапёре счётчик мин */
    .score-block {
      background: #1a2a1a;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 4px solid #4a524a;
      border-top-color: #2a322a;
      border-left-color: #2a322a;
      box-shadow: inset 0 0 0 2px #0a0a0a, 0 4px 8px rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .score-label {
      font-family: 'Courier New', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: #d0d8d0;
      text-shadow: 0 0 8px #aac0aa;
      letter-spacing: 2px;
      background: #0a1a0a;
      padding: 4px 18px;
      border-radius: 6px;
      border: 2px solid #2a3a2a;
      box-shadow: inset 0 0 6px #00000088;
    }

    .score-value {
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 2.8rem;
      font-weight: 700;
      color: #f5d742;
      background: #0a1a0a;
      padding: 0 24px;
      border-radius: 6px;
      min-width: 80px;
      display: inline-block;
      text-align: center;
      text-shadow: 0 0 18px #f0b34b80, 0 0 40px #ffcc44;
      border: 2px solid #2a3a2a;
      box-shadow: inset 0 0 10px #00000088;
      transition: all 0.12s ease;
      line-height: 1.4;
    }

    /* дисплей таймера */
    .timer-block {
      background: #1a2a1a;
      padding: 14px 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 4px solid #4a524a;
      border-top-color: #2a322a;
      border-left-color: #2a322a;
      box-shadow: inset 0 0 0 2px #0a0a0a, 0 4px 8px rgba(0,0,0,0.6);
    }

    .timer-display {
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 4.8rem;
      font-weight: 700;
      letter-spacing: 6px;
      color: #e04040;
      background: #0a1a0a;
      padding: 8px 16px;
      border-radius: 6px;
      display: inline-block;
      min-width: 200px;
      text-shadow: 0 0 12px #ff4444aa, 0 0 30px #ff222288;
      box-shadow: inset 0 0 10px #00000088;
      border: 2px solid #2a3a2a;
      transition: color 0.1s;
      cursor: default;
      line-height: 1.2;
    }

    /* кнопки в стиле сапёра */
    .button-group {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 6px;
    }

    .btn {
      border: none;
      background: #b0b8b0;
      background-image: linear-gradient(145deg, #d0d8d0, #9aa29a);
      padding: 14px 22px;
      border-radius: 8px;
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a2a1a;
      text-shadow: 1px 1px 0 #d0d8d0;
      cursor: pointer;
      box-shadow: 
        0 5px 0 #4a524a,
        0 6px 12px rgba(0, 0, 0, 0.4);
      transition: all 0.06s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      flex: 1 1 auto;
      border: 3px solid #c0c8c0;
      border-top-color: #e8f0e8;
      border-left-color: #e8f0e8;
      letter-spacing: 0.5px;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #4a524a, 0 6px 12px rgba(0, 0, 0, 0.4);
      background-image: linear-gradient(145deg, #9aa29a, #b0b8b0);
      border-top-color: #7a827a;
      border-left-color: #7a827a;
    }

    .btn-primary {
      background-image: linear-gradient(145deg, #c8d8c8, #8aa08a);
      color: #0a1a0a;
      border-top-color: #d8e8d8;
      border-left-color: #d8e8d8;
    }

    .btn-primary:active {
      background-image: linear-gradient(145deg, #7a8a7a, #9aaa9a);
    }

    .btn-success {
      background-image: linear-gradient(145deg, #d4c8a0, #b8a870);
      color: #1a1a0a;
      border-top-color: #e8dcc0;
      border-left-color: #e8dcc0;
    }

    .btn-success:active {
      background-image: linear-gradient(145deg, #a89860, #c8b880);
    }

    .btn-secondary {
      background-image: linear-gradient(145deg, #d0c8b0, #a89a7a);
      color: #1a1a0a;
      border-top-color: #e8dcc8;
      border-left-color: #e8dcc8;
    }

    .btn-secondary:active {
      background-image: linear-gradient(145deg, #9a8a6a, #b8aa8a);
    }

    .btn:disabled {
      opacity: 0.6;
      transform: translateY(2px);
      box-shadow: 0 2px 0 #4a524a, 0 4px 8px rgba(0, 0, 0, 0.3);
      pointer-events: none;
      filter: grayscale(0.3);
    }

    /* нижняя часть — только YouTube */
    .footer {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 4px solid #7a827a;
      border-bottom: 2px solid #c0c8c0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .footer-youtube {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #8a9a8a;
      padding: 8px 28px 8px 22px;
      border-radius: 40px;
      text-decoration: none;
      color: #1a2a1a;
      font-weight: 700;
      font-size: 1.15rem;
      border: 3px solid #5a6a5a;
      border-top-color: #b0c0b0;
      border-left-color: #b0c0b0;
      box-shadow: 0 4px 0 #3a4a3a, 0 6px 12px rgba(0, 0, 0, 0.3);
      transition: all 0.1s;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.3px;
    }

    .footer-youtube:hover {
      transform: scale(1.02);
      background: #9aaa9a;
      border-top-color: #c8d8c8;
      border-left-color: #c8d8c8;
      box-shadow: 0 4px 0 #3a4a3a, 0 8px 18px rgba(0, 0, 0, 0.5);
    }

    .footer-youtube:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #3a4a3a, 0 6px 12px rgba(0, 0, 0, 0.4);
    }

    .footer-youtube svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
      flex-shrink: 0;
      filter: drop-shadow(1px 1px 0 #5a6a5a);
    }

    @media (max-width: 480px) {
      .card { padding: 16px 14px; }
      .timer-display { font-size: 3.4rem; min-width: 150px; letter-spacing: 4px; }
      .score-value { font-size: 2.2rem; min-width: 60px; padding: 0 14px; }
      .score-label { font-size: 1.1rem; padding: 2px 12px; }
      .btn { min-width: 90px; padding: 12px 14px; font-size: 1.0rem; }
      .menu-bar { font-size: 0.85rem; }
      .footer-youtube { font-size: 0.9rem; padding: 6px 18px 6px 14px; }
      .footer-youtube svg { width: 20px; height: 20px; }
    }
  </style>
</head>
<body>
  <div class="card" role="main">
    <!-- Меню как в Сапёре -->
    <div class="menu-bar">
      <span class="title">🪖 Санёр</span>
      <span>Игра</span>
      <span>Размер</span>
      <span>ESC</span>
      <span>Помощь</span>
    </div>

    <!-- Счёт побед -->
    <div class="score-block">
      <span class="score-label">🏆 ПОБЕДЫ</span>
      <span class="score-value" id="scoreDisplay">0</span>
    </div>

    <!-- Таймер -->
    <div class="timer-block">
      <div class="timer-display" id="timerDisplay" aria-live="polite">00:00</div>
    </div>

    <!-- Кнопки управления -->
    <div class="button-group">
      <button class="btn btn-primary" id="timerToggleBtn">▶ Пуск</button>
      <button class="btn btn-success" id="winBtn">➕ +1 Победа</button>
      <button class="btn btn-secondary" id="resetBtn">⟲ Сброс</button>
    </div>

    <!-- Нижняя часть — только YouTube -->
    <div class="footer">
      <a href="https://www.youtube.com/@reformoti" target="_blank" rel="noopener noreferrer" class="footer-youtube">
        <!-- YouTube иконка -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        <span>YouTube / reformoti</span>
      </a>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // --- DOM ---
      const timerDisplay = document.getElementById('timerDisplay');
      const timerToggleBtn = document.getElementById('timerToggleBtn');
      const resetBtn = document.getElementById('resetBtn');
      const winBtn = document.getElementById('winBtn');
      const scoreDisplay = document.getElementById('scoreDisplay');

      // --- Состояние ---
      let timerInterval = null;
      let isRunning = false;
      let totalSeconds = 0;
      let winCount = 0;
      const MAX_SECONDS = 5999; // 99:59

      // --- Форматирование (MM:SS) ---
      function formatTime(sec) {
        if (sec < 0) sec = 0;
        if (sec > MAX_SECONDS) sec = MAX_SECONDS;
        const mins = Math.floor(sec / 60);
        const remain = sec % 60;
        return `${mins.toString().padStart(2, '0')}:${remain.toString().padStart(2, '0')}`;
      }

      function updateDisplay() {
        timerDisplay.textContent = formatTime(totalSeconds);
      }

      function updateScore() {
        scoreDisplay.textContent = winCount;
        // анимация вспышки
        scoreDisplay.style.transition = 'transform 0.1s, text-shadow 0.1s';
        scoreDisplay.style.transform = 'scale(1.25)';
        scoreDisplay.style.textShadow = '0 0 30px #ffd966, 0 0 60px #f0b34b';
        setTimeout(() => {
          scoreDisplay.style.transform = 'scale(1)';
          scoreDisplay.style.textShadow = '0 0 18px #f0b34b80, 0 0 40px #ffcc44';
        }, 150);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        isRunning = false;
        timerToggleBtn.textContent = '▶ Пуск';
      }

      function startTimer() {
        if (isRunning) return;
        if (totalSeconds >= MAX_SECONDS) {
          totalSeconds = 0;
          updateDisplay();
        }

        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }

        isRunning = true;
        timerToggleBtn.textContent = '⏹ Стоп';

        timerInterval = setInterval(() => {
          if (totalSeconds < MAX_SECONDS) {
            totalSeconds++;
            updateDisplay();
          } else {
            stopTimer();
            timerToggleBtn.textContent = '⏹ Стоп (лимит)';
          }
        }, 1000);
      }

      // --- Обработчики ---
      function onToggle() {
        if (isRunning) {
          stopTimer();
        } else {
          startTimer();
        }
      }

      function resetTimer() {
        const wasRunning = isRunning;
        if (wasRunning) {
          stopTimer();
        }
        totalSeconds = 0;
        updateDisplay();
        timerToggleBtn.textContent = '▶ Пуск';
        if (timerToggleBtn.textContent === '⏹ Стоп (лимит)') {
          timerToggleBtn.textContent = '▶ Пуск';
        }
      }

      function incrementWin() {
        winCount++;
        updateScore();
      }

      // двойной клик по таймеру = сброс
      function onTimerDblClick() {
        resetTimer();
        timerDisplay.style.transition = 'color 0.1s';
        timerDisplay.style.color = '#ff8844';
        setTimeout(() => {
          timerDisplay.style.color = '#e04040';
        }, 150);
      }

      // --- Инициализация ---
      function init() {
        totalSeconds = 0;
        winCount = 0;
        updateDisplay();
        updateScore();
        stopTimer();

        timerToggleBtn.addEventListener('click', onToggle);
        resetBtn.addEventListener('click', resetTimer);
        winBtn.addEventListener('click', incrementWin);
        timerDisplay.addEventListener('dblclick', onTimerDblClick);
      }

      init();
    })();
  </script>
</body>
</html>
